# Grants cgroup-v2 delegation so runbox can create per-run cgroups and measure
# CPU time + peak RSS deterministically. No --privileged, no added capabilities.
services:
  runbox:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    # cgroup:host + a writable cgroup fs is what enables per-run accounting.
    cgroup: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    # Without these two lines the sandbox still runs, but falls back to
    # wall-clock timing (cpu_ms / peak_kb come back None).
